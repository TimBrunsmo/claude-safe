name: Claude PR Review

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Review PR #${{ github.event.pull_request.number }} in the claude-safe repo.
            This project isolates Claude Code inside Docker containers for security.
            Core files are: Dockerfile, install.sh, and shell functions for Fish/Bash/Zsh.
            Focus on: shell compatibility, Docker security, macOS/Linux compatibility, and install.sh correctness.
            Post your findings as a comment on the PR.
