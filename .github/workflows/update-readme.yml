name: Update README on Merge

on:
  pull_request_target:
    types: [closed]

jobs:
  update-readme:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
      id-token: write

    steps:
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            PR #${{ github.event.pull_request.number }} was just merged into claude-safe.
            PR title: ${{ github.event.pull_request.title }}
            Check what changed (run: git diff HEAD~1 HEAD) and read the current README.md.
            Update README.md ONLY if the merged changes introduce or modify new shell support, install steps, Docker security flags, commands, or container access rules.
            If no update is needed, do nothing.
            If you do update the README, commit it directly with a message like "docs: auto-update README for PR #${{ github.event.pull_request.number }}".
