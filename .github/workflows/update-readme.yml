name: Update README on Merge

on:
  pull_request:
    types: [closed]

jobs:
  update-readme:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            PR #${{ github.event.pull_request.number }} was just merged into claude-safe.
            PR title: ${{ github.event.pull_request.title }}

            Check what changed (run: git diff HEAD~1 HEAD) and read the current README.md.

            Update README.md ONLY if the merged changes introduce or modify:
            - New shell support (beyond fish/bash/zsh)
            - New install steps or commands
            - New Docker security flags or isolation behaviour
            - New commands (beyond claude-safe and claude-safe-build)
            - Changes to what is or isn't accessible inside the container

            If no update is needed, do nothing.

            If you do update the README, commit it with:
            git config user.name "claude-bot"
            git config user.email "claude-bot@users.noreply.github.com"
            git add README.md
            git commit -m "docs: auto-update README for PR #${{ github.event.pull_request.number }}"
            git push
          claude_args: |
            --allowedTools "Read,Edit,Bash(git diff:*),Bash(git add:*),Bash(git commit:*),Bash(git push:*),Bash(git config:*)"
            --max-turns 8
